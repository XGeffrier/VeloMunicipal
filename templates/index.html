<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche commune</title>

<style>
body {
    font-family: Inter, system-ui, sans-serif;
    background: linear-gradient(135deg,#f5f7fb,#e8ecf5);
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card {
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    width:95%;
    max-width:520px;
}

h2 {
    margin-top:0;
}

input {
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
    outline:none;
}

input:focus {
    border-color:#4a6cff;
    box-shadow:0 0 0 3px rgba(74,108,255,0.15);
}

.results {
    margin-top:10px;
    max-height:220px;
    overflow:auto;
}

.item {
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.item:hover {
    background:#f0f3ff;
}

button {
    margin-top:18px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a6cff;
    color:white;
    font-size:16px;
    cursor:pointer;
    display:none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Commencez à taper le nom d'une commune ou d'un code postal</h2>

    <input id="search" placeholder="37000 Tours">

    <div class="results" id="results"></div>

    <form id="form">
        <button id="btn">Voir</button>
    </form>
</div>

<script>
const communes = {{ communes|tojson }};
const input = document.getElementById("search");
const results = document.getElementById("results");
const btn = document.getElementById("btn");
const form = document.getElementById("form");

let selected = null;

function normalize(str){
    return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function score(query, text){
    query = normalize(query);
    text = normalize(text);

    if(text.includes(query)) return 3;

    let qi = 0;
    for(let i=0;i<text.length && qi<query.length;i++){
        if(text[i] === query[qi]) qi++;
    }
    return qi === query.length ? 2 : 0;
}

input.addEventListener("input", () => {
    const q = input.value.trim();
    results.innerHTML = "";
    btn.style.display = "none";
    selected = null;

    if(q.length < 1) return;

    let matches = communes
        .map(c => {
            const label = `${c.code_postal} ${c.nom}`;
            return { ...c, label, score: score(q,label) };
        })
        .filter(c => c.score > 0)
        .sort((a,b)=>b.score-a.score)
        .slice(0,8);

    matches.forEach(c=>{
        const div = document.createElement("div");
        div.className="item";
        div.textContent=c.label;

        div.onclick=()=>{
            input.value=c.label;
            selected=c;
            results.innerHTML="";
            btn.style.display="block";
            form.action="/commune/"+c.insee;
        };

        results.appendChild(div);
    });
});
</script>

</body>
</html>
